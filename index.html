<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phasmophobia — Ghost Hunter Pro | Guía Completa de Investigación</title>
<meta name="description" content="Herramienta profesional para identificar fantasmas en Phasmophobia. Base de datos actualizada, guía de evidencias y objetos malditos.">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg-deep: #06060D;
    --bg-panel: #0D0D1A;
    --bg-card: #121225;
    --bg-card-hover: #1A1A35;
    --accent-cyan: #00D4FF;
    --accent-cyan-dim: #00D4FF33;
    --accent-gold: #FFD700;
    --accent-gold-dim: #FFD70033;
    --accent-red: #FF4444;
    --accent-red-dim: #FF444433;
    --accent-green: #00FF88;
    --accent-green-dim: #00FF8833;
    --accent-purple: #9B59B6;
    --accent-orange: #FF8C00;
    --text-primary: #E8E8F0;
    --text-secondary: #8888AA;
    --text-dim: #555570;
    --border: #1E1E3A;
    --glow-cyan: 0 0 20px #00D4FF44, 0 0 40px #00D4FF22;
    --glow-gold: 0 0 20px #FFD70044, 0 0 40px #FFD70022;
    --glow-red: 0 0 20px #FF444444;
    --glow-purple: 0 0 20px #9B59B644;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; position: relative; }

  /* PARTICLES */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--accent-cyan); opacity: 0; animation: float-particle linear infinite; }
  @keyframes float-particle {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; } 90% { opacity: 0.3; }
    100% { transform: translateY(-10px) translateX(30px); opacity: 0; }
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    background: linear-gradient(180deg, #06060D 0%, transparent 100%);
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: radial-gradient(circle, #1E3A5F, #06060D);
    border: 1px solid var(--accent-cyan); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    box-shadow: var(--glow-cyan); animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: var(--glow-cyan); }
    50% { box-shadow: 0 0 30px #00D4FF66, 0 0 60px #00D4FF33; }
  }
  .logo-text h1 { font-family: 'Creepster', cursive; font-size: 26px; color: var(--accent-cyan); letter-spacing: 2px; text-shadow: 0 0 20px var(--accent-cyan); line-height: 1; }
  .logo-text p { font-size: 10px; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; margin-top: 3px; }

  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lang-toggle { display: flex; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .lang-btn { padding: 7px 12px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text-secondary); transition: all 0.2s; letter-spacing: 0.5px; }
  .lang-btn.active { background: var(--accent-cyan); color: #000; }
  .reset-btn { padding: 7px 14px; background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; letter-spacing: 1px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .reset-btn:hover { background: var(--accent-red); color: #fff; box-shadow: var(--glow-red); }

  /* LAYOUT */
  .app-layout { position: relative; z-index: 5; display: grid; grid-template-columns: 290px 1fr 350px; gap: 0; height: calc(100vh - 78px); overflow: hidden; }
  .panel { border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .panel:last-child { border-right: none; }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-title { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel-title i { color: var(--accent-cyan); font-size: 11px; }

  /* EVIDENCE CARDS */
  .evidence-grid { display: flex; flex-direction: column; gap: 7px; }
  .evidence-card { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); padding: 10px 12px; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 10px; user-select: none; position: relative; overflow: hidden; }
  .evidence-card:hover { border-color: var(--accent-cyan); background: var(--bg-card-hover); }
  .evidence-card.confirmed { border-color: var(--accent-green); background: var(--accent-green-dim); box-shadow: 0 0 10px var(--accent-green-dim); }
  .evidence-card.ruled-out { border-color: var(--accent-red); background: var(--accent-red-dim); opacity: 0.7; }
  .evidence-card.impossible { opacity: 0.25; pointer-events: none; }
  .ev-icon { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; background: var(--bg-deep); border: 1px solid var(--border); transition: all 0.25s; }
  .evidence-card.confirmed .ev-icon { background: var(--accent-green-dim); border-color: var(--accent-green); }
  .evidence-card.ruled-out .ev-icon { background: var(--accent-red-dim); border-color: var(--accent-red); }
  .ev-info { flex: 1; min-width: 0; }
  .ev-name { font-size: 12px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
  .ev-sub { font-size: 9px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
  .ev-state { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.25s; flex-shrink: 0; }
  .evidence-card.confirmed .ev-state { background: var(--accent-green); border-color: var(--accent-green); color: #000; }
  .evidence-card.ruled-out .ev-state { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }

  .evidence-legend { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { font-size: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
  .click-hint { font-size: 10px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.4; padding: 6px 8px; background: var(--bg-card); border-radius: 6px; border: 1px solid var(--border); }

  /* GHOST PANEL */
  .ghost-stats { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-item { text-align: center; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: var(--accent-cyan); line-height: 1; }
  .stat-num.zero { color: var(--accent-red); }
  .stat-label { font-size: 9px; color: var(--text-secondary); margin-top: 3px; letter-spacing: 1px; }
  .filter-status { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .filter-active { border-color: var(--accent-cyan); }

  .ghost-grid { display: flex; flex-direction: column; gap: 7px; }
  .ghost-card { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); padding: 12px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; animation: slide-in 0.2s ease; }
  .ghost-card:hover { border-color: var(--accent-gold); background: var(--bg-card-hover); }
  .ghost-card.selected { border-color: var(--accent-gold); box-shadow: var(--glow-gold); background: #1A1500; }
  .ghost-card.eliminated { opacity: 0.2; pointer-events: none; }
  .ghost-card.perfect-match { border-color: var(--accent-cyan); box-shadow: var(--glow-cyan); }
  .ghost-card.mimic-special { border-color: var(--accent-purple) !important; box-shadow: var(--glow-purple) !important; }

  @keyframes slide-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .ghost-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
  .ghost-name-block { flex: 1; }
  .ghost-name { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .ghost-name-en { font-size: 10px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
  .ghost-prob { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--bg-deep); border: 1px solid var(--border); white-space: nowrap; }
  .ghost-prob.high { color: var(--accent-green); border-color: var(--accent-green); }
  .ghost-prob.mid { color: var(--accent-gold); border-color: var(--accent-gold); }
  .ghost-prob.low { color: var(--text-secondary); }

  .ghost-evidence-row { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
  .ev-chip { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--bg-deep); border: 1px solid var(--border); color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; transition: all 0.2s; }
  .ev-chip.match { background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green); }
  .ev-chip.mismatch { background: var(--accent-red-dim); border-color: var(--accent-red); color: var(--accent-red); text-decoration: line-through; }
  .ev-chip.mimic-orb { background: #9B59B633; border-color: var(--accent-purple); color: var(--accent-purple); }

  .ghost-hint { font-size: 10px; color: var(--text-secondary); line-height: 1.4; margin-bottom: 5px; }
  .ghost-hint span { color: var(--accent-gold); }
  .prob-bar-bg { height: 3px; background: var(--bg-deep); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .prob-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .match-badge { position: absolute; top: 8px; right: 8px; background: var(--accent-cyan); color: #000; font-size: 8px; font-weight: 700; padding: 2px 5px; border-radius: 3px; letter-spacing: 1px; }
  .mimic-badge { position: absolute; top: 8px; right: 8px; background: var(--accent-purple); color: #fff; font-size: 8px; font-weight: 700; padding: 2px 5px; border-radius: 3px; letter-spacing: 1px; }

  .no-match { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
  .no-match i { font-size: 42px; margin-bottom: 14px; display: block; color: var(--accent-red); opacity: 0.5; }
  .no-match h3 { font-size: 15px; margin-bottom: 8px; color: var(--text-primary); }
  .no-match p { font-size: 11px; line-height: 1.6; }

  /* GUIDE PANEL */
  .guide-tabs { display: flex; gap: 3px; margin-bottom: 14px; background: var(--bg-card); padding: 4px; border-radius: var(--radius-sm); flex-wrap: wrap; }
  .guide-tab { flex: 1; min-width: 60px; padding: 7px 4px; text-align: center; cursor: pointer; font-size: 10px; font-weight: 700; border-radius: 5px; color: var(--text-secondary); transition: all 0.2s; letter-spacing: 0.5px; border: none; background: transparent; text-transform: uppercase; }
  .guide-tab.active { background: var(--accent-cyan); color: #000; }
  .guide-section { display: none; }
  .guide-section.active { display: block; }

  /* EVIDENCE GUIDE ACCORDION */
  .evidence-guide-item { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); margin-bottom: 8px; overflow: hidden; }
  .evidence-guide-header { padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: space-between; transition: background 0.2s; }
  .evidence-guide-header:hover { background: var(--bg-card-hover); }
  .evidence-guide-header-left { display: flex; align-items: center; gap: 8px; }
  .evidence-guide-body { padding: 0 12px; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.2s; }
  .evidence-guide-body.open { max-height: 800px; padding: 0 12px 12px; }
  .guide-step { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .guide-step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent-cyan); color: #000; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .guide-step-text { font-size: 11px; line-height: 1.6; color: var(--text-secondary); }
  .guide-step-text strong { color: var(--text-primary); }
  .guide-step-text em { color: var(--accent-cyan); font-style: normal; }
  .tip-box { background: var(--accent-gold-dim); border: 1px solid var(--accent-gold); border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 10px; color: var(--accent-gold); line-height: 1.5; display: flex; gap: 6px; align-items: flex-start; }
  .warning-box { background: var(--accent-red-dim); border: 1px solid var(--accent-red); border-radius: 6px; padding: 8px 10px; margin-top: 6px; font-size: 10px; color: var(--accent-red); line-height: 1.5; display: flex; gap: 6px; align-items: flex-start; }
  .info-box { background: var(--accent-cyan-dim); border: 1px solid var(--accent-cyan); border-radius: 6px; padding: 8px 10px; margin-top: 6px; font-size: 10px; color: var(--accent-cyan); line-height: 1.5; display: flex; gap: 6px; align-items: flex-start; }

  /* GHOST DETAIL */
  .ghost-detail { display: none; }
  .ghost-detail.open { display: block; }
  .ghost-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .back-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; transition: all 0.2s; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .back-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .detail-section { margin-bottom: 14px; }
  .detail-section-title { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .detail-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; }
  .detail-text { font-size: 11px; line-height: 1.7; color: var(--text-secondary); }
  .detail-text strong { color: var(--text-primary); }
  .strength-item, .weakness-item { display: flex; gap: 8px; align-items: flex-start; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 11px; line-height: 1.5; }
  .strength-item { background: var(--accent-red-dim); color: var(--accent-red); }
  .weakness-item { background: var(--accent-green-dim); color: var(--accent-green); }
  .sanity-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-deep); border: 1px solid var(--accent-purple); color: var(--accent-purple); font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; margin-top: 6px; margin-right: 6px; }
  .speed-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-deep); border: 1px solid var(--accent-orange); color: var(--accent-orange); font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

  /* CURSED OBJECTS */
  .cursed-grid { display: flex; flex-direction: column; gap: 8px; }
  .cursed-card { border: 1px solid var(--accent-purple); border-radius: var(--radius-sm); background: #0D0A1A; overflow: hidden; }
  .cursed-header { padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: space-between; transition: background 0.2s; }
  .cursed-header:hover { background: #1A0D2E; }
  .cursed-header-left { display: flex; align-items: center; gap: 8px; }
  .cursed-icon { width: 30px; height: 30px; border-radius: 6px; background: #9B59B622; border: 1px solid var(--accent-purple); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .cursed-name { font-size: 12px; font-weight: 700; color: var(--accent-purple); }
  .cursed-sub { font-size: 9px; color: var(--text-secondary); }
  .cursed-body { padding: 0 12px; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.2s; }
  .cursed-body.open { max-height: 800px; padding: 0 12px 12px; }
  .cursed-effect { font-size: 11px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
  .cursed-effect strong { color: var(--text-primary); }
  .cursed-danger { background: #FF444422; border: 1px solid var(--accent-red); border-radius: 5px; padding: 6px 8px; font-size: 10px; color: var(--accent-red); line-height: 1.5; display: flex; gap: 5px; margin-top: 6px; }
  .cursed-tip2 { background: #9B59B622; border: 1px solid var(--accent-purple); border-radius: 5px; padding: 6px 8px; font-size: 10px; color: var(--accent-purple); line-height: 1.5; display: flex; gap: 5px; margin-top: 6px; }

  /* TIPS SECTION */
  .tip-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 7px; }
  .tip-card-title { font-size: 11px; font-weight: 700; color: var(--accent-cyan); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .tip-card-text { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }

  /* SECTION HEADER for guide sub-sections */
  .section-header { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--accent-purple); text-transform: uppercase; margin: 14px 0 8px; display: flex; align-items: center; gap: 6px; }

  @media (max-width: 1100px) { .app-layout { grid-template-columns: 260px 1fr 310px; } }
  @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; height: auto; overflow: visible; } .panel { border-right: none; border-bottom: 1px solid var(--border); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="particles"></div>

<header>
  <div class="logo-area">
    <div class="logo-icon">👻</div>
    <div class="logo-text">
      <h1>PHASMOPHOBIA</h1>
      <p id="header-subtitle">Guía de Investigación</p>
    </div>
  </div>
  <div class="header-controls">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es-la')">ES-LA</button>
      <button class="lang-btn" onclick="setLang('es-es')">ES-ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <button class="reset-btn" onclick="resetAll()">
      <i class="fas fa-redo"></i>
      <span id="btn-reset">Reiniciar</span>
    </button>
  </div>
</header>

<div class="app-layout">
  <!-- LEFT: EVIDENCE -->
  <div class="panel">
    <div class="panel-title"><i class="fas fa-flask"></i> <span id="lbl-evidences">Evidencias</span></div>
    <div class="evidence-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-green)"></div> <span id="lbl-confirmed">Confirmada</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent-red)"></div> <span id="lbl-ruled">Descartada</span></div>
    </div>
    <div class="click-hint" id="lbl-click-hint">Click 1x = Confirmar · Click 2x = Descartar · Click 3x = Limpiar</div>
    <div class="evidence-grid" id="evidence-grid"></div>
  </div>

  <!-- CENTER: GHOSTS -->
  <div class="panel">
    <div class="panel-title"><i class="fas fa-ghost"></i> <span id="lbl-ghosts">Fantasmas Posibles</span></div>
    <div class="ghost-stats">
      <div class="stat-item">
        <div class="stat-num" id="stat-possible">24</div>
        <div class="stat-label" id="lbl-stat-possible">POSIBLES</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-ev" style="color:var(--accent-green)">0</div>
        <div class="stat-label" id="lbl-stat-ev">EVIDENCIAS</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-elim" style="color:var(--accent-red)">0</div>
        <div class="stat-label" id="lbl-stat-elim">ELIMINADOS</div>
      </div>
    </div>
    <div id="filter-status" class="filter-status" style="display:none">
      <i class="fas fa-filter" style="color:var(--accent-cyan)"></i>
      <span id="filter-text" style="font-size:11px;color:var(--text-secondary)"></span>
    </div>
    <div class="ghost-grid" id="ghost-grid"></div>
  </div>

  <!-- RIGHT: GUIDE -->
  <div class="panel">
    <div class="panel-title"><i class="fas fa-book-open"></i> <span id="lbl-guide">Guía</span></div>

function t(key) { return LANGS[currentLang]?.[key] || LANGS['es-la'][key] || key; }

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  applyStaticLang();
  renderAll();
}

function applyStaticLang() {
  const L = LANGS[currentLang];
  document.getElementById('header-subtitle').textContent = L.subtitle;
  document.getElementById('btn-reset').textContent = L.reset;
  document.getElementById('lbl-evidences').textContent = L.evidences;
  document.getElementById('lbl-confirmed').textContent = L.confirmed;
  document.getElementById('lbl-ruled').textContent = L.ruled;
  document.getElementById('lbl-click-hint').textContent = L['click-hint'];
  document.getElementById('lbl-ghosts').textContent = L.ghosts;
  document.getElementById('lbl-stat-possible').textContent = L['stat-possible'];
  document.getElementById('lbl-stat-ev').textContent = L['stat-ev'];
  document.getElementById('lbl-stat-elim').textContent = L['stat-elim'];
  document.getElementById('lbl-guide').textContent = L.guide;
  document.getElementById('lbl-back').textContent = L.back;
  document.getElementById('tab-btn-how-to').textContent = L['tab-how-to'];
  document.getElementById('tab-btn-cursed').textContent = L['tab-cursed'];
  document.getElementById('tab-btn-tips').textContent = L['tab-tips'];
}

function initParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (-Math.random() * 20) + 's';
    const size = (1 + Math.random() * 2.5) + 'px';
    p.style.width = p.style.height = size;
    if (Math.random() > 0.65) p.style.background = '#9B59B6';
    c.appendChild(p);

// ============================================================
// EVIDENCE IMPOSSIBILITY CHECK
// ============================================================
function isEvidenceImpossible(evId) {
  const confirmed = Object.entries(evidenceStates).filter(([,v]) => v === 'confirmed').map(([k]) => k);
  const ruledOut = Object.entries(evidenceStates).filter(([,v]) => v === 'ruled-out').map(([k]) => k);
  if (confirmed.includes(evId) || ruledOut.includes(evId)) return false;
  const testConfirmed = [...confirmed, evId];
  const possible = GHOSTS.filter(g => {
    const allEvs = [...g.evidences, ...(g.extraEvidence || [])];
    return testConfirmed.every(e => allEvs.includes(e)) && !ruledOut.some(e => g.evidences.includes(e));
  });
  return possible.length === 0;
}

function cycleEvidence(id) {
  const cur = evidenceStates[id];
  evidenceStates[id] = cur === 'none' ? 'confirmed' : cur === 'confirmed' ? 'ruled-out' : 'none';
  renderAll();
}

// ============================================================
// RENDER EVIDENCES
// ============================================================
function renderEvidences() {
  const grid = document.getElementById('evidence-grid');
  grid.innerHTML = '';
  EVIDENCES.forEach(ev => {
    const state = evidenceStates[ev.id];
    const impossible = isEvidenceImpossible(ev.id);
    const div = document.createElement('div');
    div.className = `evidence-card${state === 'confirmed' ? ' confirmed' : state === 'ruled-out' ? ' ruled-out' : ''}${impossible && state === 'none' ? ' impossible' : ''}`;
    div.onclick = () => cycleEvidence(ev.id);
    const icon = state === 'confirmed' ? 'fa-check' : state === 'ruled-out' ? 'fa-times' : 'fa-circle';
    div.innerHTML = `
      <div class="ev-icon" style="color:${ev.color}">${ev.icon}</div>
      <div class="ev-info">
        <div class="ev-name">${ev.name[currentLang]}</div>
        <div class="ev-sub">${ev.abbr}</div>
      </div>
      <div class="ev-state"><i class="fas ${icon}" style="font-size:8px"></i></div>
    `;
    grid.appendChild(div);
  });
}

// ============================================================
// CALC POSSIBLE GHOSTS
// Key: El Mimo siempre incluye orbes como evidencia adicional.
// Si orbes están confirmados, El Mimo debe aparecer como posible.
// Si orbes están DESCARTADOS, El Mimo NO es posible (porque siempre tiene orbes).
// ============================================================
function calcGhosts() {
  const confirmed = Object.entries(evidenceStates).filter(([,v]) => v === 'confirmed').map(([k]) => k);
  const ruledOut = Object.entries(evidenceStates).filter(([,v]) => v === 'ruled-out').map(([k]) => k);

  return GHOSTS.map(g => {
    const allEvs = [...g.evidences, ...(g.extraEvidence || [])];
    // Confirmed evidences must all be in the ghost's evidence pool
    const hasAllConfirmed = confirmed.every(e => allEvs.includes(e));
    // Ruled-out evidences: for Mimic, check base evidences AND extra (orbs)
    const hasRuledOut = ruledOut.some(e => allEvs.includes(e));
    const possible = hasAllConfirmed && !hasRuledOut;

    const matchCount = confirmed.filter(e => allEvs.includes(e)).length;
    const probability = possible ? (confirmed.length === 0 ? 1/GHOSTS.length : matchCount / Math.max(g.evidences.length, 1)) : 0;

    return { ...g, possible, probability, matchCount, _confirmed: confirmed, _ruledOut: ruledOut };
  }).sort((a,b) => b.probability - a.probability);
}

// ============================================================
// RENDER GHOSTS
// ============================================================
function renderGhosts() {
  const results = calcGhosts();
  const possible = results.filter(g => g.possible);
  const eliminated = results.filter(g => !g.possible);
  const confirmedCount = Object.values(evidenceStates).filter(v => v === 'confirmed').length;
  const ruledCount = Object.values(evidenceStates).filter(v => v === 'ruled-out').length;

  document.getElementById('stat-possible').textContent = possible.length;
  document.getElementById('stat-possible').className = `stat-num${possible.length === 0 ? ' zero' : ''}`;
  document.getElementById('stat-ev').textContent = confirmedCount;
  document.getElementById('stat-elim').textContent = eliminated.length;

  const fs = document.getElementById('filter-status');
  if (confirmedCount > 0 || ruledCount > 0) {
    fs.style.display = 'flex'; fs.className = 'filter-status filter-active';
    const names = Object.entries(evidenceStates).filter(([,v]) => v !== 'none').map(([k]) => {
      const ev = EVIDENCES.find(e => e.id === k);
      return (ev?.abbr || k) + (evidenceStates[k] === 'ruled-out' ? '✗' : '✓');
    });
    document.getElementById('filter-text').textContent = t('filter') + ' ' + names.join(', ');
  } else {
    fs.style.display = 'none';
  }

  const grid = document.getElementById('ghost-grid');
  grid.innerHTML = '';

  if (possible.length === 0 && (confirmedCount > 0 || ruledCount > 0)) {
    grid.innerHTML = `<div class="no-match"><i class="fas fa-skull-crossbones"></i><h3>${t('no-ghosts-title')}</h3><p>${t('no-ghosts-text')}</p></div>`;
    return;
  }

  const maxProb = possible.length > 0 ? possible[0].probability : 0;

  [...possible, ...eliminated].forEach(ghost => {
    const name = ghost.name[currentLang];
    const enName = ghost.name['en'];
    const prob = ghost.possible ? Math.round((ghost.probability / (maxProb || 1)) * 100) : 0;
    const probClass = prob >= 75 ? 'high' : prob >= 40 ? 'mid' : 'low';
    const confirmed3 = ghost._confirmed.length === 3 && ghost._confirmed.every(e => [...ghost.evidences, ...(ghost.extraEvidence||[])].includes(e));
    const isPerfect = ghost.possible && confirmed3;
    const isMimicCard = ghost.isMimic && ghost.possible;

    const card = document.createElement('div');
    card.className = `ghost-card${ghost.possible ? '' : ' eliminated'}${isPerfect ? ' perfect-match' : ''}${isMimicCard ? ' mimic-special' : ''}${selectedGhostId === ghost.id ? ' selected' : ''}`;
    card.onclick = () => ghost.possible && showGhostDetail(ghost.id);

    const allEvs = [...ghost.evidences, ...(ghost.extraEvidence || [])];
    const chipsHtml = allEvs.map(evId => {
      const ev = EVIDENCES.find(e => e.id === evId);
      if (!ev) return '';
      const isConfirmed = ghost._confirmed.includes(evId);
      const isRuledOut = ghost._ruledOut.includes(evId);
      const isExtra = ghost.extraEvidence?.includes(evId);
      let chipClass = '';
      if (isExtra && !isConfirmed) chipClass = 'mimic-orb';
      else if (isConfirmed) chipClass = 'match';
      else if (isRuledOut) chipClass = 'mismatch';
      return `<span class="ev-chip ${chipClass}" title="${ev.name[currentLang]}">${ev.abbr}${isExtra ? ' ✦' : ''}</span>`;
    }).join('');

    const hint = ghost.hint[currentLang];

    card.innerHTML = `
      ${isMimicCard && !isPerfect ? `<div class="mimic-badge">${t('mimic-badge')}</div>` : ''}
      ${isPerfect ? `<div class="match-badge">${t('match-badge')}</div>` : ''}
      <div class="ghost-header">
        <div class="ghost-name-block">
          <div class="ghost-name">${name}</div>
          ${currentLang !== 'en' ? `<div class="ghost-name-en">${enName}</div>` : ''}
        </div>
        ${ghost.possible ? `<div class="ghost-prob ${probClass}">${prob}%</div>` : ''}
      </div>
      <div class="ghost-evidence-row">${chipsHtml}</div>
      ${ghost.possible ? `<div class="ghost-hint">💡 <span>${hint}</span></div>` : ''}
      ${ghost.possible ? `<div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${prob}%;background:${prob>=75?'var(--accent-green)':prob>=40?'var(--accent-gold)':'var(--text-secondary)'}"></div></div>` : ''}
    `;
    grid.appendChild(card);
  });
}
